    <script>
    const eraButtons = document.querySelectorAll('.era-list li');
    const pediaSets = document.querySelectorAll('.pedia-set');
    const printPages = document.querySelectorAll('.print-page');

    eraButtons.forEach(button => {
        button.addEventListener('click', () => {
        const selectedEra = button.dataset.era;

        document.body.setAttribute('data-era', selectedEra);

        eraButtons.forEach(item => item.classList.remove('active'));
        button.classList.add('active');

        pediaSets.forEach(set => {
            if (selectedEra === 'all' || set.dataset.eraSet === selectedEra) {
            set.classList.remove('hidden');
            } else {
            set.classList.add('hidden');
            }
        });
        });
    });

    window.addEventListener('beforeprint', () => {
        const selectedEra = document.body.getAttribute('data-era') || 'all';

        printPages.forEach(page => {
        if (selectedEra === 'all' || page.dataset.era === selectedEra) {
            page.classList.remove('print-hidden');
        } else {
            page.classList.add('print-hidden');
        }
        });
    });

    window.addEventListener('afterprint', () => {
        printPages.forEach(page => {
        page.classList.remove('print-hidden');
        });
    });
    </script>
